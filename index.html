<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muhammad Bilal - AI Portfolio</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        neonCyan: '#00f3ff',
                        neonPurple: '#bc13fe',
                        darkBg: '#050505',
                        glassBg: 'rgba(255, 255, 255, 0.03)',
                        glassBorder: 'rgba(255, 255, 255, 0.08)'
                    },
                    animation: {
                        'blob': 'blob 7s infinite',
                        'spin-slow': 'spin 15s linear infinite',
                        'float': 'float 6s ease-in-out infinite',
                        'pulse-glow': 'pulse-glow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' }
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-20px)' }
                        },
                        'pulse-glow': {
                            '0%, 100%': { opacity: 1 },
                            '50%': { opacity: .5 }

                    }
                }
            }
        }
    </script>

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Framer Motion -->
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            color: #ffffff;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            font-family: 'Outfit', sans-serif;
        }

        /* Glassmorphism utilities */
        .glass-panel {
            background: rgba(20, 20, 25, 0.4);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        .glass-panel:hover {
            border: 1px solid rgba(0, 243, 255, 0.3);
            box-shadow: 0 4px 30px rgba(0, 243, 255, 0.1);
        }

        .text-gradient {
            background: linear-gradient(135deg, #00f3ff, #bc13fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .neon-button {
            position: relative;
            background: transparent;
            color: white;
            transition: all 0.3s ease;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .neon-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, #00f3ff, #bc13fe);
            z-index: -1;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .neon-button:hover::before {
            opacity: 1;
        }

        .neon-button:hover {
            border-color: transparent;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.4);
        }

        .neon-button-outline {
            position: relative;
            background: transparent;
            color: white;
            border: 1px solid #00f3ff;
            transition: all 0.3s ease;
        }

        .neon-button-outline:hover {
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.5) inset, 0 0 15px rgba(0, 243, 255, 0.5);
            background: rgba(0, 243, 255, 0.1);
        }

        /* Mesh background */
        .mesh-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -2;
            background-color: #050505;
            background-image:
                radial-gradient(circle at 15% 50%, rgba(0, 243, 255, 0.08), transparent 40%),
                radial-gradient(circle at 85% 30%, rgba(188, 19, 254, 0.08), transparent 40%),
                radial-gradient(circle at 50% 80%, rgba(0, 243, 255, 0.05), transparent 40%);
        }

        /* Grid overlay */
        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.5;
            pointer-events: none;
        }

        /* Particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.3;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #050505;
        }

        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(to bottom, #00f3ff, #bc13fe);
        }

        .profile-glow {
            box-shadow: 0 0 50px rgba(0, 243, 255, 0.3), inset 0 0 20px rgba(188, 19, 254, 0.3);
        }
    </style>
</head>

<body>
    <div class="mesh-bg"></div>
    <div class="grid-overlay"></div>
    <div id="root"></div>

    <script type="text/babel">
        // Polyfill/Check for framer motion
        const FM = window.Motion || window.FramerMotion;
        const { motion, AnimatePresence } = FM;
        const { useState, useEffect, useRef } = React;

        // Typwritter effect component
        const TypewriterEffect = ({ texts }) => {
            const [displayText, setDisplayText] = useState('');
            const [index, setIndex] = useState(0);
            const [isDeleting, setIsDeleting] = useState(false);

            useEffect(() => {
                const currentText = texts[index % texts.length];

                const typeSpeed = isDeleting ? 30 : 80;

                const timer = setTimeout(() => {
                    if (!isDeleting && displayText === currentText) {
                        setTimeout(() => setIsDeleting(true), 2000);
                    } else if (isDeleting && displayText === '') {
                        setIsDeleting(false);
                        setIndex(i => i + 1);
                    } else {
                        setDisplayText(currentText.substring(0, displayText.length + (isDeleting ? -1 : 1)));
                    }
                }, typeSpeed);

                return () => clearTimeout(timer);
            }, [displayText, isDeleting, index, texts]);

            return (
                <span className="text-xl md:text-2xl font-light text-gray-300 min-h-[32px] block">
                    {displayText}
                    <motion.span
                        animate={{ opacity: [0, 1, 0] }}
                        transition={{ repeat: Infinity, duration: 0.8 }}
                        className="inline-block ml-1 w-[2px] h-[1em] bg-neonCyan align-middle"
                    />
                </span>
            );
        };

        // Floating Particles Background
        const FloatingParticles = () => {
            const [particles, setParticles] = useState([]);
            useEffect(() => {
                const particleCount = 40;
                const newParticles = Array.from({ length: particleCount }).map((_, i) => ({
                    id: i,
                    x: Math.random() * 100,
                    y: Math.random() * 100,
                    size: Math.random() * 3 + 1,
                    duration: Math.random() * 20 + 10,
                    delay: Math.random() * 5
                }));
                setParticles(newParticles);
            }, []);

            return (
                <div className="particles">
                    {particles.map(p => (
                        <motion.div
                            key={p.id}
                            className="particle"
                            style={{
                                width: p.size,
                                height: p.size,
                                left: `${p.x}vw`,
                                top: `${p.y}vh`,
                            }}
                            animate={{
                                y: ['-10vh', '110vh'],
                                x: [`${p.x}vw`, `${p.x + (Math.random() * 10 - 5)}vw`],
                                opacity: [0, 0.5, 0]
                            }}
                            transition={{
                                duration: p.duration,
                                repeat: Infinity,
                                delay: p.delay,
                                ease: "linear"
                            }}
                        />
                    ))}
                </div>
            );
        };

        const Navigation = () => {
            return (
                <motion.nav
                    initial={{ y: -100, opacity: 0 }}
                    animate={{ y: 0, opacity: 1 }}
                    transition={{ duration: 0.8, ease: "easeOut" }}

                >
                    <div className="text-2xl font-bold font-outfit tracking-wider text-white">
                        MB<span className="text-neonCyan">.</span>
                    </div>
                    <div className="hidden md:flex space-x-8 text-sm font-medium tracking-wide">

                        <a href="#skills" className="text-gray-300 hover:text-white transition-colors hover:text-neonCyan">Skills</a>
                        <a href="#education" className="text-gray-300 hover:text-white transition-colors hover:text-neonCyan">Education</a>
                        <a href="#projects" className="text-gray-300 hover:text-white transition-colors hover:text-neonCyan">Projects</a>

                                <i className="fas fa-sparkles mr-2"></i> Open to Opportunities
                            </div>
                            <h1 className="text-5xl md:text-7xl font-bold leading-tight">
                                Hi, I'm <br />
                                <span className="text-gradient">Muhammad Bilal</span>

                            <TypewriterEffect texts={[
                                "AI Student",

                                "Operations Support Enthusiast"

                            <p className="text-gray-400 text-lg md:text-xl leading-relaxed max-w-xl font-light">

                            </p>

                            <div className="flex flex-wrap gap-4 pt-4">
                                <a href="#contact" className="neon-button px-8 py-3 rounded-full font-semibold flex items-center gap-2">
                                    <i className="fas fa-envelope"></i> Contact Me
                                </a>
                                <a href="#" className="neon-button-outline px-8 py-3 rounded-full font-semibold flex items-center gap-2">
                                    <i className="fas fa-download"></i> Download Resume
                                </a>
                                <a href="#skills" className="glass-panel px-8 py-3 rounded-full font-semibold hover:bg-white/10 transition-colors flex items-center gap-2">
                                    <i className="fas fa-compass"></i> Explore Portfolio

                            </div>

                        <motion.div

                        >
                            {/* Profile Image Container */}
                            <div className="relative w-72 h-72 md:w-96 md:h-96 animate-float z-10">
                                <div className="absolute inset-0 rounded-full border-2 border-neonCyan/50 profile-glow animate-[spin_10s_linear_infinite] border-dashed"></div>
                                <div className="absolute inset-2 rounded-full border border-neonPurple/50 animate-[spin_15s_linear_infinite_reverse]"></div>
                                <div className="absolute inset-4 rounded-full overflow-hidden bg-gray-900 border-4 border-darkBg shadow-[0_0_30px_rgba(0,243,255,0.2)]">
                                    {/* Placeholder for Profile Image */}
                                    <img
                                        src="profile.jpg"
                                        alt="Muhammad Bilal"
                                        className="w-full h-full object-cover transition-all duration-500"
                                        onError={(e) => {
                                            e.target.src = 'https://via.placeholder.com/400x400/111/fff?text=MB';
                                        }}
                                    />
                                    <div className="absolute inset-0 bg-gradient-to-tr from-neonCyan/20 to-transparent mix-blend-overlay"></div>
                                </div>
                            </div>

                            {/* Floating decorative elements */}
                            <motion.div animate={{ y: [-10, 10, -10] }} transition={{ duration: 4, repeat: Infinity }} className="absolute top-10 right-10 glass-panel p-4 rounded-xl flex items-center gap-3 z-20">
                                <i className="fas fa-brain text-neonPurple text-2xl"></i>
                                <div>
                                    <p className="text-xs text-gray-400">Major</p>
                                    <p className="text-sm font-bold">AI Student</p>
                                </div>
                            </motion.div>

                            <motion.div animate={{ y: [10, -10, 10] }} transition={{ duration: 5, repeat: Infinity }} className="absolute bottom-10 left-10 glass-panel p-4 rounded-xl flex items-center gap-3 z-20">
                                <i className="fas fa-chart-line text-neonCyan text-2xl"></i>
                                <div>
                                    <p className="text-xs text-gray-400">Focus</p>
                                    <p className="text-sm font-bold">Operations Support</p>
                                </div>
                            </motion.div>
                        </motion.div>
                    </div>
                </section>
            );
        };

        const SectionHeader = ({ title, subtitle }) => (

                    initial={{ opacity: 0, y: 20 }}

                    className="text-3xl md:text-5xl font-bold mb-4 font-outfit"

                {subtitle && (

        const About = () => {
            return (
                <section className="py-24 relative z-10" id="about">
                    <div className="max-w-6xl mx-auto px-6">
                        <SectionHeader title="About Me" subtitle="A brief introduction to who I am and what drives me." />

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-12 items-center">
                            <motion.div

                                ].map((item, idx) => (

                                    </div>

                        </div>

        const Skills = () => {
            const skills = [
                { name: "Artificial Intelligence Student", icon: "fa-brain" },
                { name: "Communication Skills", icon: "fa-comments" },
                { name: "Client Handling", icon: "fa-users" },
                { name: "Scheduling & Coordination", icon: "fa-calendar-alt" },
                { name: "Administrative Support", icon: "fa-file-alt" },
                { name: "Documentation & Record Keeping", icon: "fa-folder-open" },

                { name: "Time Management", icon: "fa-clock" },

                { name: "Team Collaboration", icon: "fa-people-carry" },
                { name: "Professional Communication", icon: "fa-handshake" }
            ];

            return (
                <section className="py-24 relative z-10" id="skills">
                    <div className="max-w-6xl mx-auto px-6">
                        <SectionHeader title="Core Competencies" subtitle="Skills and abilities I bring to the table." />

                        <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                            {skills.map((skill, index) => (
                                <motion.div
                                    key={index}
                                    initial={{ opacity: 0, y: 20 }}

        const Education = () => {

                {

            return (
